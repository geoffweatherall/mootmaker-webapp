<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" width="640" height="380" role="img" aria-label="Two people meeting around a table, with a floating calendar card between them">
  <!-- Soft backdrop fields, fixed tones (not theme-reactive), same convention as the brand mark -->
  <circle cx="190" cy="180" r="165" fill="#efe9fb" />
  <circle cx="460" cy="230" r="140" fill="#e3f3f1" />

  <!-- Confetti -->
  <rect x="540" y="55" width="14" height="14" rx="4" fill="#f59e0b" transform="rotate(18 547 62)" />
  <circle cx="577" cy="102" r="7" fill="#4338ca" />
  <rect x="45" y="150" width="12" height="12" rx="3" fill="#0e8f82" transform="rotate(-15 51 156)" />
  <circle cx="600" cy="172" r="6" fill="#f59e0b" />
  <circle cx="30" cy="92" r="5" fill="#8b85f0" />

  <!-- Small floating clock -->
  <circle cx="95" cy="75" r="24" fill="#faf9f6" stroke="#f59e0b" stroke-width="5" />
  <line x1="95" y1="75" x2="95" y2="62" stroke="#1e1b2e" stroke-width="3" stroke-linecap="round" />
  <line x1="95" y1="75" x2="106" y2="75" stroke="#1e1b2e" stroke-width="3" stroke-linecap="round" />
  <circle cx="95" cy="75" r="2.4" fill="#1e1b2e" />

  <!-- Table -->
  <ellipse cx="320" cy="318" rx="235" ry="42" fill="#0b6a60" />
  <ellipse cx="320" cy="308" rx="230" ry="40" fill="#0e8f82" />

  <!-- Person A (left, violet) -->
  <path d="M158 205 Q120 185 116 148" fill="none" stroke="#4338ca" stroke-width="20" stroke-linecap="round" />
  <circle cx="116" cy="148" r="12" fill="#4338ca" />
  <rect x="150" y="185" width="95" height="105" rx="46" fill="#4338ca" />
  <circle cx="197" cy="163" r="36" fill="#8b85f0" />
  <circle cx="186" cy="160" r="2.6" fill="#1e1b2e" />
  <circle cx="208" cy="160" r="2.6" fill="#1e1b2e" />
  <path d="M188 173 Q197 179 206 173" fill="none" stroke="#1e1b2e" stroke-width="2.4" stroke-linecap="round" />

  <!-- Person B (right, teal) -->
  <path d="M405 210 Q370 195 345 178" fill="none" stroke="#0e8f82" stroke-width="20" stroke-linecap="round" />
  <circle cx="345" cy="178" r="12" fill="#0e8f82" />
  <rect x="390" y="195" width="92" height="100" rx="46" fill="#0e8f82" />
  <circle cx="444" cy="172" r="34" fill="#2dd4bf" />
  <circle cx="434" cy="169" r="2.5" fill="#1e1b2e" />
  <circle cx="455" cy="169" r="2.5" fill="#1e1b2e" />
  <path d="M436 182 Q445 188 453 182" fill="none" stroke="#1e1b2e" stroke-width="2.2" stroke-linecap="round" />

  <!-- Floating calendar card -->
  <rect x="255" y="70" width="130" height="105" rx="16" fill="#faf9f6" stroke="#e7e3f6" stroke-width="2" />
  <rect x="255" y="70" width="130" height="30" rx="16" fill="#4338ca" />
  <rect x="255" y="85" width="130" height="15" fill="#4338ca" />
  <circle cx="320" cy="128" r="22" fill="#f59e0b" />
  <path d="M310 128 L317 136 L333 118" fill="none" stroke="#faf9f6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="278" y="158" width="84" height="7" rx="3.5" fill="#e7e3f6" />
  <rect x="290" y="170" width="60" height="7" rx="3.5" fill="#e7e3f6" />
</svg>
